name: Signed Release

# Signed + notarized Mac DMG and TestFlight iOS upload.
# Requires GitHub repository secrets (see scripts/release.env.example).
#
# Triggers:
#   • workflow_dispatch — cut a release on demand
#   • push tag v*       — when signing secrets are configured, produces a
#     Gatekeeper-clean Mac DMG on GitHub Releases and uploads iOS to TestFlight

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version (optional; overrides project.yml)'
        required: false
      skip_ios:
        description: 'Skip TestFlight upload'
        type: boolean
        default: false
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  mac:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Release preflight (Mac)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_KEYCHAIN_PROFILE: ${{ secrets.NOTARY_KEYCHAIN_PROFILE }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: scripts/release-preflight.sh --mac

      - name: Build signed + notarized DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_KEYCHAIN_PROFILE: ${{ secrets.NOTARY_KEYCHAIN_PROFILE }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          ARGS=(--clean)
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            ARGS+=(--version "${{ github.event.inputs.version }}")
          fi
          scripts/build-mac-release.sh "${ARGS[@]}"

      - name: Locate DMG
        id: dmg
        run: |
          path=$(ls build/mac-release/Grokestrator-*.dmg | grep -v unsigned | head -1)
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$path")" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.dmg.outputs.name }}
          path: ${{ steps.dmg.outputs.path }}

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$'Signed + notarized macOS build (Gatekeeper-clean).\n\nDrag to Applications and open — no quarantine override needed.'
          gh release create "${{ github.ref_name }}" "${{ steps.dmg.outputs.path }}" \
            --title "Grokestrator ${{ github.ref_name }}" \
            --notes "$NOTES" \
          || gh release upload "${{ github.ref_name }}" "${{ steps.dmg.outputs.path }}" --clobber

  ios:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.skip_ios != true) }}
    runs-on: macos-15
    needs: mac
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install xcodegen

      - name: Release preflight (iOS)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: scripts/release-preflight.sh --ios

      - name: Build and upload TestFlight
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          ARGS=(--clean)
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            ARGS+=(--version "${{ github.event.inputs.version }}")
          fi
          scripts/build-ios-release.sh "${ARGS[@]}"
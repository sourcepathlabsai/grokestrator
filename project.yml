# XcodeGen spec for Grokestrator.
#
# Generates Grokestrator.xcodeproj with two app targets (macOS hybrid +
# iOS client), both depending on the local GrokestratorCore Swift package,
# matching design/06-project-structure.md.
#
# The generated .xcodeproj is NOT checked in — regenerate it any time with:
#   xcodegen generate
name: Grokestrator

options:
  bundleIdPrefix: ai.sourcepathlabs.grokestrator
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"            # Swift 6 language mode, matching GrokestratorCore
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  GrokestratorCore:
    path: Packages/GrokestratorCore

targets:
  # macOS app — hybrid: runs both the client UI and the server.
  # Intentionally non-sandboxed (it launches and manages `grok` processes).
  GrokestratorMac:
    type: application
    platform: macOS
    sources:
      - path: GrokestratorMac
      - path: GrokestratorShared
    dependencies:
      - package: GrokestratorCore
        product: GrokestratorCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sourcepathlabs.grokestrator.mac
        PRODUCT_NAME: Grokestrator
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        # Skips the export compliance form on every TestFlight / App Store
        # submission — we ship no first-party crypto and rely only on Apple
        # platform TLS (via Tailscale).
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        # Mac App Store category. Harmless under Developer ID too.
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES

  # iOS app — client only.
  GrokestratoriOS:
    type: application
    platform: iOS
    sources:
      - path: GrokestratoriOS
      - path: GrokestratorShared
      - path: GrokestratorMac/Resources/Fonts    # SourcePath fonts — shared with Mac
        buildPhase: resources
    dependencies:
      - package: GrokestratorCore
        product: GrokestratorCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sourcepathlabs.grokestrator.ios
        PRODUCT_NAME: Grokestrator
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # iOS treats Tailscale (100.64.0.0/10 + MagicDNS) as local network,
        # so the system shows a one-time permission dialog the first time
        # we try to reach the host Mac. Without a usage description, the
        # dialog has no explanation and users tend to deny.
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Grokestrator connects to your Mac over Tailscale to drive grok sessions remotely."
        # Same crypto + category posture as the Mac target.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"

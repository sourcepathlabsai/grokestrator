# XcodeGen spec for Grokestrator.
#
# Generates Grokestrator.xcodeproj with two app targets (macOS hybrid +
# iOS client), both depending on the local GrokestratorCore Swift package,
# matching design/06-project-structure.md.
#
# The generated .xcodeproj is NOT checked in — regenerate it any time with:
#   xcodegen generate
name: Grokestrator

options:
  bundleIdPrefix: ai.sourcepathlabs.grokestrator
  deploymentTarget:
    # macOS 15 / iOS 18 for the modern scroll APIs (onScrollGeometryChange) the
    # virtualized transcript uses for precise, synchronous sticky-bottom tracking.
    macOS: "15.0"
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"            # Swift 6 language mode, matching GrokestratorCore
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  GrokestratorCore:
    path: Packages/GrokestratorCore

targets:
  # macOS app — hybrid: runs both the client UI and the server.
  # Intentionally non-sandboxed (it launches and manages `grok` processes).
  GrokestratorMac:
    type: application
    platform: macOS
    sources:
      - path: GrokestratorMac
      - path: GrokestratorShared
    dependencies:
      - package: GrokestratorCore
        product: GrokestratorCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sourcepathlabs.grokestrator.mac
        PRODUCT_NAME: Grokestrator
        # Sign with a STABLE identity (Apple Development, paid team GS8DPK5RPN) instead
        # of ad-hoc "Sign to Run Locally". macOS privacy (TCC) keys file-access grants to
        # the code signature; an ad-hoc signature changes every build, so the OS re-prompts
        # for the same folders on each relaunch. A stable cert makes the grant persist
        # (allow file access once, and it sticks across rebuilds). For notarized DMG
        # distribution later, switch this to "Developer ID Application".
        DEVELOPMENT_TEAM: GS8DPK5RPN
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        # Skips the export compliance form on every TestFlight / App Store
        # submission — we ship no first-party crypto and rely only on Apple
        # platform TLS (via Tailscale).
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        # Mac App Store category. Harmless under Developer ID too.
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES

  # iOS app — client only.
  GrokestratoriOS:
    type: application
    platform: iOS
    sources:
      - path: GrokestratoriOS
      - path: GrokestratorShared
      - path: GrokestratorMac/Resources/Fonts    # SourcePath fonts — shared with Mac
        buildPhase: resources
    dependencies:
      - package: GrokestratorCore
        product: GrokestratorCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sourcepathlabs.grokestrator.ios
        PRODUCT_NAME: Grokestrator
        # GS8DPK5RPN = Bob Stucky, now a PAID Apple Developer team — so this app
        # can ship to TestFlight / the App Store (and install on device from Xcode ▶).
        # Automatic signing has Xcode mint the Apple Distribution cert + App Store
        # profile on first Archive → Distribute.
        DEVELOPMENT_TEAM: GS8DPK5RPN
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    # Explicit Info.plist (not GENERATE_INFOPLIST_FILE) so we can declare the
    # nested NSAppTransportSecurity dict — needed because media now streams from
    # the Mac's media server over plain HTTP (AVPlayer), which ATS blocks by
    # default. The Tailscale/LAN tunnel is the trust boundary.
    info:
      path: GrokestratoriOS/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocalNetworkUsageDescription: "Grokestrator connects to your Mac over Tailscale to drive grok sessions remotely."
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.developer-tools
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
